keycloak:
  auth-server-url: http://localhost:8080
  realm: project-management
  resource: pm-app
spring:
  application:
    name: demo
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/project-management
  datasource:
    url: jdbc:postgresql://localhost:5431/prjmng
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public
    validate-on-migrate: true
    out-of-order: false
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    oauth:
      client-id: pm-app           # must match Keycloak client ID
      use-pkce-with-authorization-code-grant: true
      scopes-separator: " "
  api-docs:
    path: /v3/api-docs

server:
  port: 8085
